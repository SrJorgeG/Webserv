# Servidor por defecto - Puertos de escucha
server {
    listen 8080;
    server_name localhost;
    client_max_body_size 10M;

    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/50x.html;

    # Ruta raiz - sitio estatico
    location / {
        root www/default;
        index index.html;
        autoindex off;
        allow_methods GET POST;
    }

    # Directorio de uploads
    location /uploads {
        root www/upload;
        allow_methods POST GET DELETE;
        upload_store www/upload;
        autoindex on;
    }

    # Redireccion de ejemplo
    location /old {
        redirect /;
        allow_methods GET;
    }

    # CGI con Python
    location /cgi-bin {
        root cgi-bin;
        allow_methods GET POST;
        cgi_extension .py /usr/bin/python3;
    }

    # Session/Cookie test pages
    location /login.html {
        root www/default;
        allow_methods GET;
    }
    location /welcome.html {
        root www/default;
        allow_methods GET;
    }
}
