server {
    listen 8080;
    server_name first.local;

    location / {
        root www/default;
        index index.html;
        allow_methods GET;
    }
}

server {
    listen 8081;
    server_name second.local;

    location / {
        root www/default;
        index index.html;
        allow_methods GET;
    }
}
