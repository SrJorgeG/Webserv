# Multi-CGI types configuration - demonstrates Python, PHP, and Shell CGI

server {
    listen 8080;
    server_name localhost;
    client_max_body_size 10M;

    error_page 404 /errors/404.html;

    # Static files
    location / {
        root www/default;
        index index.html;
        autoindex off;
        allow_methods GET POST;
    }

    # Uploads
    location /uploads {
        root www/upload;
        allow_methods POST GET DELETE;
        upload_store www/upload;
        autoindex on;
    }

    # Python CGI
    location /cgi-bin/py {
        root cgi-bin;
        allow_methods GET POST;
        cgi_extension .py /usr/bin/python3;
    }

    # PHP CGI
    location /cgi-bin/php {
        root cgi-bin;
        allow_methods GET POST;
        cgi_extension .php /usr/bin/php-cgi;
    }

    # Shell CGI
    location /cgi-bin/sh {
        root cgi-bin;
        allow_methods GET;
        cgi_extension .sh /bin/bash;
    }
}